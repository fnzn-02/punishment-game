<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>벌칙자 게임</title>
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icons/favicon.ico" sizes="32x32">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="벌칙게임">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div class="particles" id="particles"></div>

  <header class="app-header">
    <div class="logo-wrap">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>벌칙자 게임</h1>
        <p>게임을 골라 벌칙자를 가려라</p>
      </div>
    </div>
  </header>

  <main class="game-menu">

    <div class="game-section">
      <div class="section-header">
        <span class="section-icon">🎲</span>
        <div class="section-info">
          <span class="section-title">랜덤 게임</span>
          <span class="section-desc">운에 맡겨라</span>
        </div>
      </div>
      <div class="game-grid">
        <a href="games/ladder/ladder.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🪜</span>
          <span class="title">사다리타기</span>
        </a>
        <a href="games/bigwheel/bigwheel.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🎡</span>
          <span class="title">룰렛 돌리기</span>
        </a>
        <a href="games/draw/draw.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🎟️</span>
          <span class="title">제비뽑기</span>
        </a>
        <a href="games/fireworks/fireworks.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🎆</span>
          <span class="title">불꽃 추첨</span>
        </a>
        <a href="games/dice/dice.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🎲</span>
          <span class="title">주사위 대결</span>
        </a>
        <a href="games/lucky/lucky.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">💣</span>
          <span class="title">벌칙캡슐 뽑기</span>
        </a>
      </div>
    </div>

    <div class="game-section">
      <div class="section-header">
        <span class="section-icon">⚔️</span>
        <div class="section-info">
          <span class="section-title">대결 게임</span>
          <span class="section-desc">실력으로 승부</span>
        </div>
      </div>
      <div class="game-grid">
        <a href="games/updown/updown.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🔢</span>
          <span class="title">업다운</span>
        </a>
        <a href="games/reaction/reaction.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">⚡</span>
          <span class="title">반응속도 게임</span>
        </a>
        <a href="games/timing/timing.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🎯</span>
          <span class="title">타이밍 게임</span>
        </a>
        <a href="games/stopwatch/stopwatch.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">⏱️</span>
          <span class="title">스탑워치 게임</span>
        </a>
        <a href="games/mole/mole.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">🐹</span>
          <span class="title">두더지 잡기</span>
        </a>
        <a href="games/tictactoe/tictactoe.html" class="game-card">
          <div class="card-glow"></div>
          <span class="icon">⭕</span>
          <span class="title">틱택토</span>
        </a>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
  <script src="theme.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
