<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>벌칙자 게임</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="particles" id="particles"></div>

  <header>
    <div class="logo-wrap">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>벌칙자 게임</h1>
        <p>게임을 골라 벌칙자를 가려라</p>
      </div>
    </div>
  </header>

  <main class="game-menu">
    <a href="games/ladder/ladder.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🪜</span>
      <span class="title">사다리타기</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/roulette/roulette.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🎡</span>
      <span class="title">룰렛 돌리기</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/draw/draw.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🎟️</span>
      <span class="title">제비뽑기</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/croc/croc.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🐊</span>
      <span class="title">악어 이빨</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/card/card.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🃏</span>
      <span class="title">카드 뽑기</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/gacha/gacha.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🟢</span>
      <span class="title">캡슐토이</span>
      <span class="badge complete">완성</span>
    </a>
    <a href="games/updown/updown.html" class="game-card">
      <div class="card-glow"></div>
      <span class="icon">🔢</span>
      <span class="title">업다운</span>
      <span class="badge complete">완성</span>
    </a>
  </main>

  <script src="script.js"></script>
</body>
</html>
