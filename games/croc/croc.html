<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>악어 이빨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
  <link rel="stylesheet" href="croc.css">
</head>
<body>
  <div class="app-wrap">
    <header class="app-header">
      <a href="../../index.html" class="home-btn">← 홈</a>
      <h1>🐊 악어 이빨</h1>
    </header>

    <main class="croc-main">

      <!-- 악어 입 -->
      <div class="mouth-wrap" id="mouth-wrap">

        <!-- 윗턱 (물릴 때 내려옴) -->
        <div class="upper-jaw" id="upper-jaw">
          <div class="upper-gum">
            <div class="upper-teeth-row" id="upper-teeth-row">
              <!-- JS가 생성 -->
            </div>
          </div>
          <div class="palate"></div>
        </div>

        <!-- 입안 중앙 (고정) -->
        <div class="mouth-interior">
          <div class="tongue"></div>
        </div>

        <!-- 아랫턱 (고정) -->
        <div class="lower-jaw">
          <div class="lower-gum">
            <div class="lower-teeth-row" id="lower-teeth-row">
              <!-- JS가 생성 -->
            </div>
          </div>
        </div>

      </div>

      <!-- 상태 & 컨트롤 -->
      <div class="status-box" id="status-box">
        <span id="status-text">두근두근... 이빨을 눌러보세요!</span>
      </div>

      <div class="tooth-count">남은 이빨 <strong id="count-num">13</strong>개</div>

      <button class="restart-btn" id="restart-btn" style="display:none">🔄 다시하기</button>

    </main>
  </div>

  <div class="bite-flash" id="bite-flash"></div>
  <script src="croc.js"></script>
  <script src="../../theme.js"></script>
</body>
</html>
