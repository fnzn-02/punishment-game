<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>악어 이빨 (Real Toy)</title>
    <link rel="stylesheet" href="croc.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div class="ladder-app">
        <header class="app-header">
            <a href="../../index.html" class="home-btn">🏠 홈</a>
            <h1>🐊 악어 이빨 게임</h1>
        </header>

        <div class="game-area">
            <div class="croc-toy">
                
                <div class="upper-jaw" id="upper-jaw">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="nostrils">
                        <div class="nostril"></div><div class="nostril"></div>
                    </div>
                    <div class="upper-teeth">
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <div class="lower-jaw">
                    <div class="mouth-interior">
                        <div class="teeth-row" id="teeth-row">
                            </div>
                        <div class="tongue"></div>
                    </div>
                </div>

            </div>
        </div>

        <div class="controls">
            <div class="msg-box" id="msg-box">이빨을 눌러보세요!</div>
            <button id="restart-btn" class="btn-restart">다시 하기</button>
        </div>
    </div>
    <script src="croc.js"></script>
</body>
</html>
