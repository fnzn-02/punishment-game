<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카드 뽑기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="card.css">
</head>
<body>
  <div class="app-wrap">
    <header class="app-header">
      <a href="../../index.html" class="home-btn">← 홈</a>
      <h1>🃏 카드 뽑기</h1>
    </header>

    <main class="card-main">
      <!-- 설정 화면 -->
      <div class="setup-panel" id="setup-panel">
        <p class="setup-desc">참가자 수를 설정하고 시작하세요.<br>가장 낮은 카드를 뽑은 사람이 벌칙!</p>

        <div class="player-stepper">
          <button id="btn-dec">−</button>
          <div class="stepper-display">
            <span id="player-count">4</span>
            <span class="unit">명</span>
          </div>
          <button id="btn-inc">+</button>
        </div>

        <div class="joker-toggle">
          <label class="toggle-label">
            <input type="checkbox" id="joker-toggle" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            조커 포함 (조커 = 즉시 벌칙)
          </label>
        </div>

        <button class="btn btn-primary start-btn" id="start-btn">카드 뽑기 시작</button>
      </div>

      <!-- 게임 화면 -->
      <div class="game-panel" id="game-panel" style="display:none">
        <div class="turn-info" id="turn-info">
          <span id="current-player">1번째 플레이어</span>의 차례
        </div>

        <div class="deck-area" id="deck-area">
          <div class="deck" id="deck">
            <div class="deck-shadow"></div>
            <div class="deck-stack"></div>
            <div class="card-back top-card" id="top-card">
              <div class="card-pattern"></div>
            </div>
          </div>
          <p class="deck-hint">카드를 클릭하여 뽑기</p>
        </div>

        <div class="drawn-cards" id="drawn-cards"></div>

        <button class="btn btn-ghost reset-btn" id="reset-btn">🔄 다시하기</button>
      </div>

      <!-- 결과 화면 -->
      <div class="result-panel" id="result-panel" style="display:none">
        <div class="result-icon" id="result-icon">💀</div>
        <h2 id="result-title">벌칙자 결정!</h2>
        <p id="result-desc"></p>
        <div class="result-cards" id="result-cards"></div>
        <button class="btn btn-primary" id="again-btn">🔄 다시하기</button>
      </div>
    </main>
  </div>

  <script src="card.js"></script>
</body>
</html>
